        {{ user_message }}


        {% if conversation_summary %}

        Conversation context:

        {{ conversation_summary }}

        {% endif %}


        {% if user_facts %}

        Known facts about the user:

        {% for fact in user_facts %}

        - {{ fact }}

        {% endfor %}

        {% endif %}


        Rules:

        - Build the best possible case for the user''s view using evidence and logic.

        - Do not strawman or weaken the argument intentionally.

        - Acknowledge when the user''s position has genuine strengths.

        - Keep the argument concise and structured.

        '
    '2':
