# =============================================================================
# Production stack — nginx + Next.js standalone + FastAPI + PostgreSQL
# =============================================================================
# Usage:
#   cp frontend/.env.production.example frontend/.env.production
#   docker compose -f docker-compose.prod.yml up --build -d
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chatbot}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8001/v1}
      LLM_BACKEND: ${LLM_BACKEND:-vllm}
      MODEL_NAME: ${MODEL_NAME:-Qwen/Qwen3-14B}
      LOG_FORMAT: json
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLIENT_API_URL: ${NEXT_PUBLIC_CLIENT_API_URL:-/api}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:8000/api
      USE_NEXT_REWRITES: "false"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    environment:
      FRONTEND_HOST: frontend
      FRONTEND_PORT: "3000"
      API_HOST: api
      API_PORT: "8000"
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
