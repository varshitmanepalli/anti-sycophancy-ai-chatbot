services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # vLLM model server (GPU required — comment out if unavailable)
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3-14B
      --host 0.0.0.0
      --port 8001
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  # profiles: [gpu]  # uncomment to make vLLM optional

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/chatbot
      VLLM_BASE_URL: http://vllm:8001/v1
      LLM_BACKEND: vllm
      MODEL_NAME: Qwen/Qwen3-14B
      LOG_FORMAT: text
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  # ---------------------------------------------------------------------------
  # Next.js frontend (development — use docker-compose.prod.yml for production)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_CLIENT_API_URL: /api
      USE_NEXT_REWRITES: "true"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
